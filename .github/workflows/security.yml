name: Security

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - run: go build ./...
      - run: go test ./...

      - run: docker build -t flowproxy:test -f Dockerfile.proxy .
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: flowproxy:test
          severity: CRITICAL,HIGH
          exit-code: 1

      - run: docker build -t alertworker:test -f Dockerfile.alertworker .
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: alertworker:test
          severity: CRITICAL,HIGH
          exit-code: 1
